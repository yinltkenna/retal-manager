services:
  identity:
    build:
      context: .
      dockerfile: Services/identity-service/IdentityService.Web/Dockerfile
    container_name: identity-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=IdentityService_Db;User Id=sa;Password=123;TrustServerCertificate=True;
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Redis__Connection=redis:6379
      - JwtSettings__Key=66869724acdaf603c964c8415f07cc79
      - JwtSettings__Issuer=RentalIdentity
      - JwtSettings__Audience=RentalClients
      - JwtSettings__ExpiresInMinutes=60
    # depends_on:
    #   - redis
    #   - rabbitmq
    networks:
      - rental-net

  property:
    build:
      context: .
      dockerfile: Services/property-service/PropertyService.Web/Dockerfile
    container_name: property-api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=PropertyService_Db;User Id=sa;Password=123;TrustServerCertificate=True;
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Redis__Connection=redis:6379
      - JwtSettings__Key=66869724acdaf603c964c8415f07cc79
      - JwtSettings__Issuer=RentalIdentity
      - JwtSettings__Audience=RentalClients
      - JwtSettings__ExpiresInMinutes=60
    depends_on:
      - redis
      - rabbitmq
    networks:
      - rental-net

  tenancy:
    build:
      context: .
      dockerfile: Services/tenancy-service/TenancyService.Web/Dockerfile
    container_name: tenancy-api
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=TenancyService_Db;User Id=sa;Password=123;TrustServerCertificate=True;
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Redis__Connection=redis:6379
      - JwtSettings__Key=66869724acdaf603c964c8415f07cc79
      - JwtSettings__Issuer=RentalIdentity
      - JwtSettings__Audience=RentalClients
      - JwtSettings__ExpiresInMinutes=60
    depends_on:
      - redis
      - rabbitmq
    networks:
      - rental-net

  notification:
    build:
      context: .
      dockerfile: Services/notification-service/NotificationService.Web/Dockerfile
    container_name: notification-api
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=NotificationService_Db;User Id=sa;Password=123;TrustServerCertificate=True;
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Redis__Connection=redis:6379
      - JwtSettings__Key=66869724acdaf603c964c8415f07cc79
      - JwtSettings__Issuer=RentalIdentity
      - JwtSettings__Audience=RentalClients
      - JwtSettings__ExpiresInMinutes=60
    depends_on:
      - redis
      - rabbitmq
    networks:
      - rental-net

  gateway:
    build:
      context: .
      dockerfile: Services/gateway/ApiGateway/Dockerfile
    container_name: api-gateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - JwtSettings__Key=66869724acdaf603c964c8415f07cc79
      - JwtSettings__Issuer=RentalIdentity
      - JwtSettings__Audience=RentalClients
    depends_on:
      - identity
    networks:
      - rental-net

  redis:
    container_name: redis-cache
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - rental-net
      
  redis-insight:
    container_name: redis-insight
    image: redislabs/redisinsight:1.14.0
    ports:
      - "8001:8001"
    networks:
      - rental-net

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rental-net

networks:
  rental-net:
    driver: bridge